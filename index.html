<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>

    <meta name="description" content="Secure password generator with entropy calculator and passphrase mode.">
    <meta name="author" content="Sharafath Ahammed V">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/3a44531c23.js" crossorigin="anonymous"></script>
</head>

<body>

<div class="note">Password copied to clipboard!</div>

<div class="container">

    <!-- LEFT SIDE -->
    <div class="left">

        <h1>PASSWORD<br>GENERATOR</h1>

        <div class="password-box">
            <span id="password-text">Password</span>
            <div class="icons">
                <div class="copy">
                    <i class="fa-regular fa-copy"></i>
                </div>
            </div>
        </div>

        <!-- STRENGTH BOX -->
        <div class="strength-box">
            <div class="strength-bar">
                <div class="strength-fill"></div>
            </div>

            <p>Entropy: <span id="entropy">0</span> bits</p>
            <p>Estimated Crack Time: <span id="crack-time">—</span></p>
            <p>Security Level: <span id="security-level">—</span></p>
        </div>

        <button class="generate">
            GENERATE_
            <span>→</span>
        </button>

        <!-- MODE SWITCH -->
        <div class="mode-section">
            <label>
                <input type="radio" name="mode" value="password" checked>
                Character Mode
            </label>

            <label>
                <input type="radio" name="mode" value="passphrase">
                Passphrase Mode
            </label>
        </div>

        

        <!-- CUSTOM PHRASE -->
        <div class="phrase-box">
            <input type="text" id="userPhrase" placeholder="Enter your phrase...">
            <button id="phraseBtn">Create Strong Password</button>
        </div>

        <!-- SLIDER -->
        <div class="character-method">
            <div class="slider-section">
                <input type="range" min="4" max="32" value="18">
                <div class="length">18</div>
            </div>

            <!-- OPTIONS -->
            <div class="options">
                <label><input type="checkbox" checked> Uppercase letters</label>
                <label><input type="checkbox" checked> Lowercase letters</label>
                <label><input type="checkbox"> Numbers</label>
                <label><input type="checkbox"> Symbols</label>
            </div>
        </div>

    </div>

    <!-- RIGHT SIDE -->
    <div class="right">
        <h2>PASSWORD HISTORY</h2>
        <ul class="history"></ul>
        <div class="clear">Clear history</div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
